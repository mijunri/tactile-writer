version: "3.8"
services:
  writer:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TACTILE_API_BASE=${TACTILE_API_BASE:-http://118.31.57.25/tactile/api}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///./data/writer.db
      - CORS_ORIGINS=*
    volumes:
      - writer-data:/app/data
    restart: unless-stopped

volumes:
  writer-data:
